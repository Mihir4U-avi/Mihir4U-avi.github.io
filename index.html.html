<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mihir Kumar Batar | Cybersecurity Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --neon-green:#00ff41;
    --electric-blue:#00d4ff;
    --dark-bg:#020b14;
    --panel-bg:rgba(0,15,30,0.92);
    --grid-color:rgba(0,212,255,0.08);
    --glow-green:0 0 10px #00ff41,0 0 30px rgba(0,255,65,0.4);
    --glow-blue:0 0 10px #00d4ff,0 0 30px rgba(0,212,255,0.4);
  }
  html,body{width:100%;height:100%;overflow:hidden;background:#020b14;}

  #canvas-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;}
  canvas{display:block;}

  /* HUD */
  #hud{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;}

  /* HEADER */
  #header{
    position:fixed;top:0;left:0;width:100%;padding:16px 32px;
    display:flex;justify-content:space-between;align-items:center;
    z-index:100;pointer-events:all;
    background:linear-gradient(to bottom,rgba(2,11,20,0.9),transparent);
    border-bottom:1px solid rgba(0,212,255,0.15);
  }
  .logo{font-family:'Orbitron',monospace;font-size:1.1rem;color:#00d4ff;text-shadow:var(--glow-blue);letter-spacing:3px;}
  .logo span{color:#00ff41;}
  .nav-links{display:flex;gap:24px;}
  .nav-links a{
    font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:rgba(0,212,255,0.7);
    text-decoration:none;letter-spacing:2px;text-transform:uppercase;transition:all .3s;
    padding:6px 12px;border:1px solid transparent;
  }
  .nav-links a:hover{color:#00ff41;border-color:rgba(0,255,65,0.4);text-shadow:var(--glow-green);background:rgba(0,255,65,0.05);}

  /* STATUS BAR */
  #status-bar{
    position:fixed;bottom:0;left:0;width:100%;
    padding:8px 32px;display:flex;justify-content:space-between;align-items:center;
    background:linear-gradient(to top,rgba(2,11,20,0.95),transparent);
    border-top:1px solid rgba(0,212,255,0.1);z-index:100;pointer-events:all;
  }
  .status-item{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:rgba(0,212,255,0.5);letter-spacing:1px;}
  .status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#00ff41;margin-right:6px;animation:blink 1.5s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

  /* INTRO SCREEN */
  #intro{
    position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;
    background:#020b14;display:flex;flex-direction:column;justify-content:center;align-items:center;
    transition:opacity 1s ease;
  }
  #intro.fade-out{opacity:0;pointer-events:none;}
  .intro-glitch{
    font-family:'Orbitron',monospace;font-size:clamp(2rem,5vw,4rem);font-weight:900;
    color:#00d4ff;text-align:center;letter-spacing:8px;line-height:1.2;
    text-shadow:var(--glow-blue);animation:glitch 3s infinite;
  }
  @keyframes glitch{
    0%,100%{transform:translate(0);filter:none;}
    2%{transform:translate(-2px,1px);filter:hue-rotate(90deg);}
    4%{transform:translate(2px,-1px);}
    6%{transform:translate(0);}
    97%{transform:translate(0);}
    98%{transform:translate(2px,2px);filter:hue-rotate(-90deg);}
  }
  .intro-sub{font-family:'Share Tech Mono',monospace;font-size:0.85rem;color:#00ff41;letter-spacing:4px;margin-top:16px;text-shadow:var(--glow-green);}
  .intro-progress{
    width:300px;height:2px;background:rgba(0,212,255,0.1);margin-top:40px;
    border:1px solid rgba(0,212,255,0.2);position:relative;overflow:hidden;
  }
  .intro-progress-bar{height:100%;background:linear-gradient(90deg,#00ff41,#00d4ff);width:0%;transition:width 0.1s;}
  .intro-status{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:rgba(0,212,255,0.6);margin-top:12px;letter-spacing:2px;}
  #enter-btn{
    display:none;margin-top:32px;padding:12px 40px;
    font-family:'Orbitron',monospace;font-size:0.9rem;font-weight:700;letter-spacing:4px;
    color:#020b14;background:#00ff41;border:none;cursor:pointer;
    text-shadow:none;box-shadow:0 0 20px rgba(0,255,65,0.5);
    clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
    transition:all .3s;
  }
  #enter-btn:hover{background:#00d4ff;box-shadow:0 0 30px rgba(0,212,255,0.7);transform:scale(1.05);}

  /* MODAL OVERLAY */
  #modal-overlay{
    position:fixed;top:0;left:0;width:100%;height:100%;z-index:150;
    background:rgba(2,11,20,0.92);backdrop-filter:blur(8px);
    display:flex;justify-content:center;align-items:center;
    opacity:0;pointer-events:none;transition:opacity .4s;
  }
  #modal-overlay.active{opacity:1;pointer-events:all;}
  .modal-box{
    width:min(90vw,860px);max-height:88vh;overflow-y:auto;
    background:rgba(2,15,30,0.97);border:1px solid rgba(0,212,255,0.3);
    position:relative;padding:0;
    box-shadow:0 0 60px rgba(0,212,255,0.15),inset 0 0 60px rgba(0,0,0,0.5);
    clip-path:polygon(0 0,calc(100% - 24px) 0,100% 24px,100% 100%,24px 100%,0 calc(100% - 24px));
  }
  .modal-box::-webkit-scrollbar{width:4px;}
  .modal-box::-webkit-scrollbar-track{background:rgba(0,0,0,0.3);}
  .modal-box::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.3);}
  .modal-header{
    padding:24px 32px 16px;border-bottom:1px solid rgba(0,212,255,0.15);
    display:flex;justify-content:space-between;align-items:flex-start;
    background:linear-gradient(135deg,rgba(0,212,255,0.05),transparent);
  }
  .modal-title{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:700;color:#00d4ff;letter-spacing:3px;}
  .modal-subtitle{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:#00ff41;letter-spacing:2px;margin-top:4px;}
  .modal-close{
    width:32px;height:32px;cursor:pointer;border:1px solid rgba(0,212,255,0.3);
    display:flex;justify-content:center;align-items:center;
    font-size:1rem;color:rgba(0,212,255,0.7);background:transparent;
    transition:all .3s;font-family:monospace;flex-shrink:0;
  }
  .modal-close:hover{color:#ff4444;border-color:rgba(255,68,68,0.5);background:rgba(255,68,68,0.1);}
  .modal-body{padding:24px 32px 32px;}

  /* SECTION HEADINGS */
  .sec-title{
    font-family:'Orbitron',monospace;font-size:0.8rem;font-weight:700;
    color:#00ff41;letter-spacing:4px;text-transform:uppercase;
    border-left:3px solid #00ff41;padding-left:12px;margin:24px 0 16px;
    text-shadow:var(--glow-green);
  }

  /* SKILL TAGS */
  .skill-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .skill-tag{
    font-family:'Share Tech Mono',monospace;font-size:0.7rem;
    padding:5px 12px;border:1px solid rgba(0,212,255,0.4);
    color:#00d4ff;background:rgba(0,212,255,0.05);letter-spacing:1px;
    transition:all .3s;cursor:default;
    clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
  }
  .skill-tag:hover{background:rgba(0,212,255,0.15);border-color:#00d4ff;text-shadow:var(--glow-blue);}
  .skill-tag.green{border-color:rgba(0,255,65,0.4);color:#00ff41;background:rgba(0,255,65,0.05);}
  .skill-tag.green:hover{background:rgba(0,255,65,0.15);border-color:#00ff41;}

  /* STAT BARS */
  .stat-bar-wrap{margin-bottom:14px;}
  .stat-label{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:rgba(0,212,255,0.8);letter-spacing:1px;margin-bottom:5px;display:flex;justify-content:space-between;}
  .stat-bar{height:4px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.15);overflow:hidden;}
  .stat-fill{height:100%;background:linear-gradient(90deg,#00ff41,#00d4ff);width:0%;transition:width 1.2s cubic-bezier(.4,0,.2,1);}

  /* PROJECT CARD */
  .proj-card{
    border:1px solid rgba(0,212,255,0.2);padding:20px;margin-bottom:16px;
    background:rgba(0,212,255,0.02);position:relative;
    clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
    transition:border-color .3s;
  }
  .proj-card:hover{border-color:rgba(0,212,255,0.5);}
  .proj-card-title{font-family:'Orbitron',monospace;font-size:0.85rem;font-weight:700;color:#00d4ff;margin-bottom:8px;}
  .proj-card-desc{font-family:'Rajdhani',sans-serif;font-size:0.9rem;color:rgba(200,220,240,0.8);line-height:1.6;margin-bottom:12px;}
  .proj-card-desc li{margin-left:16px;margin-bottom:4px;}
  .link-btn{
    display:inline-flex;align-items:center;gap:6px;
    font-family:'Share Tech Mono',monospace;font-size:0.65rem;
    padding:6px 14px;border:1px solid rgba(0,255,65,0.4);
    color:#00ff41;text-decoration:none;letter-spacing:2px;
    transition:all .3s;background:rgba(0,255,65,0.05);
    clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
  }
  .link-btn:hover{background:rgba(0,255,65,0.15);border-color:#00ff41;text-shadow:var(--glow-green);}

  /* CERT CARDS */
  .cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .cert-card{
    border:1px solid rgba(0,212,255,0.2);padding:16px;
    background:rgba(0,212,255,0.03);
    clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);
    transition:all .3s;
  }
  .cert-card:hover{border-color:rgba(0,212,255,0.5);background:rgba(0,212,255,0.07);}
  .cert-title{font-family:'Share Tech Mono',monospace;font-size:0.72rem;color:#00d4ff;letter-spacing:1px;line-height:1.5;}
  .cert-issuer{font-family:'Rajdhani',sans-serif;font-size:0.8rem;color:#00ff41;margin-top:4px;}

  /* TIMELINE */
  .timeline{position:relative;padding-left:24px;}
  .timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,#00d4ff,transparent);}
  .tl-item{position:relative;margin-bottom:24px;padding-left:16px;}
  .tl-item::before{
    content:'';position:absolute;left:-24px;top:6px;
    width:8px;height:8px;border-radius:50%;background:#00d4ff;
    box-shadow:var(--glow-blue);
  }
  .tl-title{font-family:'Orbitron',monospace;font-size:0.8rem;color:#00d4ff;font-weight:700;}
  .tl-sub{font-family:'Rajdhani',sans-serif;font-size:0.85rem;color:rgba(200,220,240,0.7);margin-top:4px;}
  .tl-date{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:#00ff41;margin-top:3px;}

  /* DETECTION VISUAL */
  .detection-wrap{padding:20px;border:1px solid rgba(0,255,65,0.2);margin-bottom:16px;background:rgba(0,255,65,0.02);}
  .detection-title{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:#00ff41;letter-spacing:2px;margin-bottom:12px;}
  .pipeline-steps{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .pipe-step{
    font-family:'Share Tech Mono',monospace;font-size:0.62rem;
    padding:6px 10px;border:1px solid rgba(0,212,255,0.3);
    color:#00d4ff;background:rgba(0,212,255,0.05);white-space:nowrap;
  }
  .pipe-arrow{color:rgba(0,212,255,0.4);font-size:0.8rem;}
  .accuracy-display{
    text-align:center;padding:24px;border:1px solid rgba(0,255,65,0.3);
    background:rgba(0,255,65,0.03);
  }
  .accuracy-num{
    font-family:'Orbitron',monospace;font-size:3rem;font-weight:900;
    color:#00ff41;text-shadow:var(--glow-green);
    animation:counter-glow 2s ease-in-out infinite alternate;
  }
  @keyframes counter-glow{
    from{text-shadow:0 0 10px #00ff41,0 0 30px rgba(0,255,65,0.4);}
    to{text-shadow:0 0 20px #00ff41,0 0 60px rgba(0,255,65,0.7),0 0 80px rgba(0,255,65,0.3);}
  }
  .accuracy-label{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:rgba(0,212,255,0.7);letter-spacing:2px;margin-top:4px;}

  /* HONEYPOT LOG */
  .log-terminal{
    background:rgba(0,0,0,0.7);border:1px solid rgba(0,255,65,0.2);
    padding:16px;font-family:'Share Tech Mono',monospace;font-size:0.65rem;
    height:160px;overflow-y:auto;color:#00ff41;line-height:1.8;
  }
  .log-terminal .log-entry{opacity:0;animation:log-appear .3s forwards;}
  .log-terminal .log-entry.error{color:#ff4444;}
  .log-terminal .log-entry.warn{color:#ffaa00;}
  @keyframes log-appear{from{opacity:0;transform:translateX(-4px);}to{opacity:1;transform:none;}}

  /* CONTACT SECTION */
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .contact-item{
    display:flex;align-items:center;gap:12px;
    padding:14px 16px;border:1px solid rgba(0,212,255,0.2);
    background:rgba(0,212,255,0.03);transition:all .3s;text-decoration:none;
  }
  .contact-item:hover{border-color:rgba(0,212,255,0.5);background:rgba(0,212,255,0.07);}
  .contact-icon{font-size:1.1rem;width:24px;text-align:center;}
  .contact-label{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:rgba(0,212,255,0.5);letter-spacing:1px;}
  .contact-value{font-family:'Rajdhani',sans-serif;font-size:0.85rem;color:#00d4ff;font-weight:600;}

  /* INSTRUCTION HINT */
  #hint{
    position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
    font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:rgba(0,212,255,0.5);
    letter-spacing:2px;text-align:center;z-index:20;pointer-events:none;
    animation:fade-hint 4s ease 2s forwards;
  }
  @keyframes fade-hint{0%{opacity:1;}100%{opacity:0;}}

  /* NODE LABELS in 3D space (HTML overlay) */
  .node-label{
    position:fixed;pointer-events:none;z-index:15;
    font-family:'Share Tech Mono',monospace;font-size:0.62rem;
    color:rgba(0,212,255,0.8);letter-spacing:2px;
    text-shadow:0 0 8px rgba(0,212,255,0.5);
    transform:translate(-50%,-50%);white-space:nowrap;
    opacity:0;transition:opacity .5s;
  }
  .node-label.visible{opacity:1;}

  /* SCAN LINE EFFECT */
  #scanline{
    position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  }
  #scanline::after{
    content:'';position:absolute;top:0;left:0;width:100%;height:4px;
    background:rgba(0,212,255,0.04);
    animation:scan 8s linear infinite;
  }
  @keyframes scan{from{top:-4px;}to{top:100vh;}}

  /* CORNER DECORATIONS */
  .corner-tl,.corner-tr,.corner-bl,.corner-br{
    position:fixed;width:40px;height:40px;z-index:20;pointer-events:none;
  }
  .corner-tl{top:12px;left:12px;border-top:1px solid rgba(0,212,255,0.4);border-left:1px solid rgba(0,212,255,0.4);}
  .corner-tr{top:12px;right:12px;border-top:1px solid rgba(0,212,255,0.4);border-right:1px solid rgba(0,212,255,0.4);}
  .corner-bl{bottom:12px;left:12px;border-bottom:1px solid rgba(0,212,255,0.4);border-left:1px solid rgba(0,212,255,0.4);}
  .corner-br{bottom:12px;right:12px;border-bottom:1px solid rgba(0,212,255,0.4);border-right:1px solid rgba(0,212,255,0.4);}

  /* ACTIVE NODE PULSE */
  .active-pulse{animation:node-pulse 2s ease-in-out infinite;}
  @keyframes node-pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(0,255,65,0.4);}
    50%{box-shadow:0 0 0 12px rgba(0,255,65,0);}
  }

  /* MOBILE RESPONSIVE */
  @media(max-width:640px){
    .cert-grid,.contact-grid{grid-template-columns:1fr;}
    .modal-header{padding:16px 20px 12px;}
    .modal-body{padding:16px 20px 24px;}
    .intro-glitch{font-size:1.8rem;letter-spacing:4px;}
    #header{padding:12px 16px;}
    .nav-links{gap:12px;}
    .nav-links a{font-size:0.65rem;padding:4px 8px;}
    .accuracy-num{font-size:2rem;}
  }
</style>
</head>

];

const nodeMeshes = [];
const nodeObjects = []; // {mesh, ring, glowMesh, def}

// Create node meshes
NODE_DEFS.forEach(def=>{
  const group = new THREE.Group();
  group.position.set(...def.pos);
  group.userData.nodeId = def.id;

  // Core sphere
  const geo = new THREE.IcosahedronGeometry(def.size, 2);
  const mat = new THREE.MeshPhongMaterial({
    color:def.color, emissive:def.glow, emissiveIntensity:0.4,
    transparent:true, opacity:0.9, wireframe:false
  });
  const mesh = new THREE.Mesh(geo, mat);
  group.add(mesh);

  // Wireframe overlay
  const wireMat = new THREE.MeshBasicMaterial({color:def.glow, wireframe:true, transparent:true, opacity:0.25});
  const wireMesh = new THREE.Mesh(geo, wireMat);
  wireMesh.scale.setScalar(1.08);
  group.add(wireMesh);

  // Outer ring
  const ringGeo = new THREE.TorusGeometry(def.size*1.8, 0.03, 8, 48);
  const ringMat = new THREE.MeshBasicMaterial({color:def.glow, transparent:true, opacity:0.5});
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI/2;
  group.add(ring);

  // Glow sphere (large transparent)
  const glowGeo = new THREE.SphereGeometry(def.size*2.2, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({color:def.glow, transparent:true, opacity:0.04, side:THREE.BackSide});
  const glowMesh = new THREE.Mesh(glowGeo, glowMat);
  group.add(glowMesh);

  scene.add(group);
  nodeMeshes.push(group);
  nodeObjects.push({group, mesh, ring, wireMesh, glowMesh, def, baseY:def.pos[1]});
});

// EDGES between nodes
const EDGES = [
  [0,1],[1,2],[1,3],[1,4],[0,4],[2,3],[3,5],[4,5],[0,6],[2,6],[1,6]
];
const edgeLines = [];
EDGES.forEach(([a,b])=>{
  const pa = new THREE.Vector3(...NODE_DEFS[a].pos);
  const pb = new THREE.Vector3(...NODE_DEFS[b].pos);
  const points=[pa,pb];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({color:0x002244, transparent:true, opacity:0.5});
  const line = new THREE.Line(geo,mat);
  scene.add(line);
  edgeLines.push({line,mat,pa,pb});
});

// PACKET SYSTEM – glowing particles traveling along edges
// ============================================================
let packetCount = 0;
const packets = [];
const PACKET_COLORS = [0x00ff41, 0x00d4ff, 0xff6600];

function spawnPacket(){
  const edgeIdx = Math.floor(Math.random()*EDGES.length);
  const [a,b] = EDGES[edgeIdx];
  const reverse = Math.random()>0.5;
  const start = new THREE.Vector3(...NODE_DEFS[reverse?b:a].pos);
  const end   = new THREE.Vector3(...NODE_DEFS[reverse?a:b].pos);
  const color = PACKET_COLORS[Math.floor(Math.random()*PACKET_COLORS.length)];
  const geo = new THREE.SphereGeometry(0.12,6,6);
  const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.9});
  const mesh = new THREE.Mesh(geo,mat);
  mesh.position.copy(start);
  scene.add(mesh);
  packets.push({mesh,start:start.clone(),end:end.clone(),t:0,speed:0.004+Math.random()*0.006,mat});
  packetCount++;
  document.getElementById('status-packets').textContent = `PACKETS: ${packetCount}`;
}

setInterval(()=>{if(packets.length<30) spawnPacket();},400);

// ============================================================
// CAMERA ORBIT / DRAG
// ============================================================
let isDragging=false, prevMouse={x:0,y:0};
let camTheta=0, camPhi=0.35, camRadius=28;
let targetTheta=0, targetPhi=0.35;

function updateCamera(){
  camera.position.x = camRadius*Math.sin(camTheta)*Math.cos(camPhi);
  camera.position.y = camRadius*Math.sin(camPhi)+2;
  camera.position.z = camRadius*Math.cos(camTheta)*Math.cos(camPhi);
  camera.lookAt(0,1,0);
}
updateCamera();

canvas.addEventListener('mousedown',e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>isDragging=false);
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const dx=(e.clientX-prevMouse.x)*0.005;
  const dy=(e.clientY-prevMouse.y)*0.005;
  targetTheta-=dx;
  targetPhi = Math.max(0.05, Math.min(1.0, targetPhi-dy));
  prevMouse={x:e.clientX,y:e.clientY};
});
canvas.addEventListener('wheel',e=>{
  camRadius = Math.max(10, Math.min(50, camRadius+e.deltaY*0.03));
});

// Touch
let prevTouch=null;
canvas.addEventListener('touchstart',e=>{prevTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};});
canvas.addEventListener('touchmove',e=>{
  if(!prevTouch)return;
  const dx=(e.touches[0].clientX-prevTouch.x)*0.006;
  const dy=(e.touches[0].clientY-prevTouch.y)*0.006;
  targetTheta-=dx;
  targetPhi=Math.max(0.05,Math.min(1.0,targetPhi-dy));
  prevTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};
});
canvas.addEventListener('touchend',()=>prevTouch=null);

// ============================================================
// RAYCASTER – node click
// ============================================================
const raycaster = new THREE.Raycaster();
const mouse2D = new THREE.Vector2();
let hoveredNode = null;
let threatCount = 0;

function onCanvasClick(e){
  mouse2D.x=(e.clientX/window.innerWidth)*2-1;
  mouse2D.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse2D, camera);
  // Collect all child meshes
  const targets = nodeMeshes.flatMap(g=>g.children.filter(c=>c.isMesh && !c.material.wireframe && !(c.material.side===THREE.BackSide)));
  const hits = raycaster.intersectObjects(targets, false);
  if(hits.length>0){
    const hitGroup = hits[0].object.parent;
    const nid = hitGroup.userData.nodeId;
    if(nid){ openNodeModal(nid); }
  }
}
canvas.addEventListener('click', onCanvasClick);

// HOVER detection for cursor
canvas.addEventListener('mousemove', e=>{
  mouse2D.x=(e.clientX/window.innerWidth)*2-1;
  mouse2D.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse2D, camera);
  const targets = nodeMeshes.flatMap(g=>g.children.filter(c=>c.isMesh && !c.material.wireframe && !(c.material.side===THREE.BackSide)));
  const hits = raycaster.intersectObjects(targets, false);
  canvas.style.cursor = hits.length>0 ? 'pointer' : 'grab';
});

// ============================================================
// INTRO BOOT SEQUENCE
// ============================================================
let introVisible = true;
const bootMessages = [
  '[ LOADING KERNEL MODULES... ]',
  '[ INITIALIZING NETWORK INTERFACE... ]',
  '[ MOUNTING DECEPTION ENGINE... ]',
  '[ CALIBRATING THREAT SENSORS... ]',
  '[ INJECTING Mihir_Resume.exe INTO NETWORK... ]',
  '[ FIREWALL AUTHENTICATED... ]',
  '[ SYSTEM READY ]'
];
let bootIdx=0;
const introBar = document.getElementById('intro-bar');
const introStatus = document.getElementById('intro-status');

function bootStep(){
  if(bootIdx >= bootMessages.length){
    document.getElementById('enter-btn').style.display='block';
    return;
  }
  introStatus.textContent = bootMessages[bootIdx];
  const pct = ((bootIdx+1)/bootMessages.length)*100;
  introBar.style.width = pct+'%';
  bootIdx++;
  setTimeout(bootStep, 400+Math.random()*300);
}
setTimeout(bootStep, 600);

function enterPortfolio(){
  const intro = document.getElementById('intro');
  intro.classList.add('fade-out');
  setTimeout(()=>{intro.style.display='none'; introVisible=false; createResumePacket();},1000);
}

// ============================================================
// FLOATING HTML LABELS (projected from 3D)
// ============================================================
const labels = NODE_DEFS.map(def=>{
  const el = document.createElement('div');
  el.className = 'node-label';
  el.textContent = def.label.replace('\n',' ');
  document.body.appendChild(el);
  return {el, def};
});

function updateLabels(){
  labels.forEach(({el,def})=>{
    const pos3 = new THREE.Vector3(...def.pos);
    pos3.y += def.size + 1.8;
    pos3.project(camera);
    const x = (pos3.x*0.5+0.5)*window.innerWidth;
    const y = (-pos3.y*0.5+0.5)*window.innerHeight;
    if(pos3.z < 1){
      el.style.left=x+'px';
      el.style.top=y+'px';
      el.classList.add('visible');
    } else {
      el.classList.remove('visible');
    }
  });
}

// ============================================================
// MAIN ANIMATION LOOP
// ============================================================
let time=0;
let autoRotate = true;

function animate(){
  requestAnimationFrame(animate);
  time += 0.01;

  // Smooth camera
  camTheta += (targetTheta - camTheta)*0.08;
  camPhi   += (targetPhi   - camPhi  )*0.08;
  if(!introVisible){
    if(autoRotate && !isDragging) targetTheta += 0.0015;
  }
  updateCamera();

  // Animate node objects
  nodeObjects.forEach((obj,i)=>{
    obj.group.position.y = obj.baseY + Math.sin(time*0.8 + i*1.1)*0.3;
    obj.group.rotation.y = time*0.5 + i*0.7;
    obj.ring.rotation.z = time*(0.4+i*0.05);
    // Pulse emissive
    const pulse = 0.3 + 0.2*Math.sin(time*2+i);
    obj.mesh.material.emissiveIntensity = pulse;
    obj.wireMesh.material.opacity = 0.15 + 0.15*Math.sin(time*1.5+i);
  });

  // Animate packets
  for(let i=packets.length-1;i>=0;i--){
    const p = packets[i];
    p.t += p.speed;
    if(p.t >= 1){
      scene.remove(p.mesh);
      p.mesh.geometry.dispose();
      packets.splice(i,1);
      continue;
    }
    p.mesh.position.lerpVectors(p.start, p.end, p.t);
    p.mesh.position.y += Math.sin(p.t*Math.PI)*0.5;
    p.mat.opacity = 0.5 + 0.5*Math.sin(p.t*Math.PI*2);
  }

  // Resume packet animation
  if(resumePacket){
    const rp = resumePacket;
    rp.t += 0.005;
    const angle = rp.t*2;
    rp.mesh.position.x = Math.sin(angle)*14;
    rp.mesh.position.z = Math.cos(angle)*14;
    rp.mesh.position.y = 1 + Math.sin(rp.t*3)*0.5;
    const scale = 1+0.3*Math.sin(time*4);
    rp.mesh.scale.setScalar(scale);
  }

  // Edge pulse
  edgeLines.forEach(({mat},i)=>{
    mat.opacity = 0.3 + 0.2*Math.sin(time*1.5+i*0.5);
  });

  // Fog particles drift
  fogParticles.rotation.y = time*0.02;

  // Update labels
  if(!introVisible) updateLabels();

  renderer.render(scene,camera);
}
animate();
